<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>CSS Rasyid Saputra</title>

  <style>
    .box {
      width: 200px;
      height: 100px;
      padding: 20px;
      margin: 20px;
      border: 2px solid black;
      background-color: lightblue;
    }

    .btn {
      padding: 10px 20px;
      margin: 10px;
      border: 1px solid black;
      background-color: green;
      color: white;
      cursor: pointer;
    }

    .row {
      display: flex;
      gap: 10px;
      margin: 20px;
    }

    .col {
      flex: 1;
      padding: 20px;
      background-color: lightgray;
      border: 1px solid black;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 2fr;
      grid-template-rows: 100px auto;
      gap: 10px;
      margin: 20px;
    }

    .grid div {
      background-color: orange;
      border: 1px solid black;
      padding: 20px;
    }
  </style>
</head>
<body>

  <h1>CSS Layout</h1>

  <h2>Box Model Dasar</h2>
  <div class="box">
    Ini adalah box.
  </div>

  <button class="btn">Tombol</button>

  <h2>Flexbox Horizontal</h2>
  <div class="row">
    <div class="col">Kolom 1</div>
    <div class="col">Kolom 2</div>
    <div class="col">Kolom 3</div>
  </div>

  <h2>Grid Layout</h2>
  <div class="grid">
    <div>Grid 1</div>
    <div>Grid 2</div>
    <div>Grid 3</div>
    <div>Grid 4</div>
  </div>

</body>
</html>
